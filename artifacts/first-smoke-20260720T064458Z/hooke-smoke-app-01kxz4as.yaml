apiVersion: apps/v1
kind: Deployment
metadata:
  name: hooke-smoke-app-01kxz4as
  namespace: hooke-experiments-scale
  labels:
    app: hooke-smoke-app-01kxz4as
    hooke.io/experiment: "true"
  annotations:
    hooke.io/run-id: "01KXZ4ASN0JVS7A6RYK6W41FBZ"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: hooke-smoke-app-01kxz4as
  template:
    metadata:
      labels:
        app: hooke-smoke-app-01kxz4as
        hooke.io/experiment: "true"
      annotations:
        hooke.io/run-id: "01KXZ4ASN0JVS7A6RYK6W41FBZ"
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: app
          image: "registry.cn-hangzhou.aliyuncs.com/google_containers/echoserver:1.10"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HOOKE_SDK_DISABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: "/"
              port: http
            periodSeconds: 1
            timeoutSeconds: 1
            failureThreshold: 30
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: hooke-smoke-app-01kxz4as
  namespace: hooke-experiments-scale
  labels:
    app: hooke-smoke-app-01kxz4as
spec:
  selector:
    app: hooke-smoke-app-01kxz4as
  ports:
    - name: http
      port: 80
      targetPort: http
