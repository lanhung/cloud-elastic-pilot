  name: hooke-node-scale-smoke-01kxz5h6
  namespace: hooke-experiments-scale-20260720t070558z
  labels:
    app: hooke-node-scale-smoke-01kxz5h6
spec:
  selector:
    app: hooke-node-scale-smoke-01kxz5h6
  ports:
    - name: http
      port: 80
      targetPort: http
